<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人簡易記帳本</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            border-color: #4CAF50;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        .summary {
            margin-top: 20px;
            padding: 12px;
            background-color: #eef7ee;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            color: #2e7d32;
        }

        .record-list {
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .category-badge {
            background-color: #e0e0e0;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: #333;
            margin-right: 8px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff5252;
            cursor: pointer;
            font-size: 14px;
            width: auto;
            padding: 0 5px;
        }

        .delete-btn:hover {
            background: none;
            color: #d32f2f;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>簡易記帳本</h2>
    
    <form id="expenseForm">
        <div class="form-group">
            <label for="amount">金額 ($)</label>
            <input type="number" id="amount" placeholder="請輸入金額" required min="1">
        </div>

        <div class="form-group">
            <label for="category">類別</label>
            <select id="category" required>
                <option value="餐飲">🍔 餐飲</option>
                <option value="交通">🚗 交通</option>
                <option value="娛樂">🎮 娛樂</option>
                <option value="購物">🛍️ 購物</option>
                <option value="日常">🏠 日常</option>
                <option value="其他">💡 其他</option>
            </select>
        </div>

        <div class="form-group">
            <label for="note">備註 (可選)</label>
            <input type="text" id="note" placeholder="如：午餐便當">
        </div>

        <button type="submit">新增記錄</button>
    </form>

    <div class="summary">
        總支出：$<span id="totalAmount">0</span>
    </div>

    <div class="record-list" id="recordList">
        <!-- 記帳明細會動態顯示在這裡 -->
    </div>
</div>

<script>
    // 讀取本地儲存資料
    let records = JSON.parse(localStorage.getItem('expenses')) || [];

    const form = document.getElementById('expenseForm');
    const recordList = document.getElementById('recordList');
    const totalAmountEl = document.getElementById('totalAmount');

    // 更新畫面與本地儲存
    function updateUI() {
        recordList.innerHTML = '';
        let total = 0;

        records.forEach((record, index) => {
            total += Number(record.amount);

            const item = document.createElement('div');
            item.className = 'record-item';
            item.innerHTML = `
                <div>
                    <span class="category-badge">${record.category}</span>
                    <span>${record.note ? record.note : record.category}</span>
                </div>
                <div>
                    <strong>$${record.amount}</strong>
                    <button class="delete-btn" onclick="deleteRecord(${index})">✕</button>
                </div>
            `;
            recordList.appendChild(item);
        });

        totalAmountEl.textContent = total;
        localStorage.setItem('expenses', JSON.stringify(records));
    }

    // 表單提交事件
    form.addEventListener('submit', (e) => {
        e.preventDefault();

        const amount = document.getElementById('amount').value;
        const category = document.getElementById('category').value;
        const note = document.getElementById('note').value;

        const newRecord = {
            amount: amount,
            category: category,
            note: note
        };

        records.push(newRecord);
        updateUI();

        // 重置表單
        form.reset();
    });

    // 刪除紀錄
    function deleteRecord(index) {
        records.splice(index, 1);
        updateUI();
    }

    // 初次載入
    updateUI();
</script>

</body>
</html>
