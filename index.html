<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人簡易記帳本 - 莫蘭迪風格</title>
    <!-- 引入 Chart.js 用於繪製圓餅圖 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* 莫蘭迪暖灰底色 */
            background-color: #E8E5E1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            /* 莫蘭迪白與淺灰色組合 */
            background: #FAFAFA;
            width: 100%;
            max-width: 480px;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #E2DDD9;
        }

        h2 {
            text-align: center;
            /* 莫蘭迪石灰藍文字 */
            color: #4A5859;
            margin-bottom: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            /* 莫蘭迪深灰棕 */
            color: #6C6B6B;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #D1CAC5;
            background-color: #F8F7F5;
            border-radius: 8px;
            font-size: 15px;
            color: #4A4A4A;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #8E9AAF;
            background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(142, 154, 175, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            /* 莫蘭迪灰綠色按鈕 */
            background-color: #7A8B7B;
            color: #FFFFFF;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
            margin-top: 5px;
        }

        button:hover {
            background-color: #687769;
        }

        button:active {
            transform: scale(0.99);
        }

        .summary {
            margin-top: 22px;
            padding: 14px;
            /* 莫蘭迪鼠尾草綠背景 */
            background-color: #E2E8E4;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            color: #435345;
            font-size: 16px;
        }

        .chart-container {
            position: relative;
            margin-top: 20px;
            width: 100%;
            max-height: 260px;
            display: flex;
            justify-content: center;
        }

        .record-list {
            margin-top: 22px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #EBE7E4;
            padding-top: 8px;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 6px;
            border-bottom: 1px solid #F0ECE9;
            color: #555;
            font-size: 15px;
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .category-badge {
            /* 莫蘭迪霧藍灰標籤 */
            background-color: #D8E2DC;
            color: #4A5859;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 8px;
            display: inline-block;
        }

        .delete-btn {
            background: none;
            border: none;
            /* 莫蘭迪乾燥玫瑰紅 */
            color: #C97A7E;
            cursor: pointer;
            font-size: 15px;
            width: auto;
            padding: 0 6px;
            margin-left: 8px;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            background: none;
            color: #A3565A;
        }

        /* 滾動條美化 (莫蘭迪風格) */
        .record-list::-webkit-scrollbar {
            width: 6px;
        }
        .record-list::-webkit-scrollbar-thumb {
            background-color: #D1CAC5;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>簡易記帳本</h2>
    
    <form id="expenseForm">
        <div class="form-group">
            <label for="amount">金額 ($)</label>
            <input type="number" id="amount" placeholder="請輸入金額" required min="1">
        </div>

        <div class="form-group">
            <label for="category">類別</label>
            <select id="category" required>
                <optgroup label="食">
                    <option value="食-點心">🍿 食-點心</option>
                    <option value="食-外賣">🛵 食-外賣</option>
                    <option value="食-餐廳">🍱 食-餐廳</option>
                    <option value="食-食材">🥦 食-食材</option>
                </optgroup>
                <optgroup label="生活用品">
                    <option value="生活用品-消耗">🧻 生活用品-消耗</option>
                    <option value="生活用品-非消耗">🧹 生活用品-非消耗</option>
                </optgroup>
                <optgroup label="其他主要類別">
                    <option value="住">🏠 住</option>
                    <option value="交通">🚗 交通</option>
                    <option value="娛樂">🎮 娛樂</option>
                    <option value="保險">🛡️ 保險</option>
                    <option value="可報銷">🧾 可報銷</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label for="note">備註 (可選)</label>
            <input type="text" id="note" placeholder="如：珍珠奶茶、房租">
        </div>

        <button type="submit">新增記錄</button>
    </form>

    <div class="summary">
        總支出：$<span id="totalAmount">0</span>
    </div>

    <!-- 圓餅圖容器 -->
    <div class="chart-container">
        <canvas id="expenseChart"></canvas>
    </div>

    <div class="record-list" id="recordList">
        <!-- 記帳明細會動態顯示在這裡 -->
    </div>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('expenses')) || [];

    const form = document.getElementById('expenseForm');
    const recordList = document.getElementById('recordList');
    const totalAmountEl = document.getElementById('totalAmount');
    
    // 初始化 Chart.js 圓餅圖 (使用莫蘭迪調色盤)
    const ctx = document.getElementById('expenseChart').getContext('2d');
    let expenseChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: [],
            datasets: [{
                data: [],
                // 莫蘭迪特調色系：霧綠、石灰藍、燕麥灰、乾燥玫瑰、奶茶、豆沙灰、淡芥末黃...
                backgroundColor: [
                    '#8E9AAF', '#CBC0D3', '#EFD3D7', '#FEEAFA', 
                    '#DEE2E6', '#A3B18A', '#588157', '#B5838D', 
                    '#E0AFA0', '#D4A373', '#CCD5AE'
                ],
                borderWidth: 1.5,
                borderColor: '#FAFAFA'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        color: '#6C6B6B',
                        font: {
                            size: 12
                        },
                        padding: 12
                    }
                }
            }
        }
    });

    // 更新圖表資料
    function updateChart() {
        const categoryTotals = {};

        records.forEach(record => {
            const cat = record.category;
            const amt = Number(record.amount);
            categoryTotals[cat] = (categoryTotals[cat] || 0) + amt;
        });

        expenseChart.data.labels = Object.keys(categoryTotals);
        expenseChart.data.datasets[0].data = Object.values(categoryTotals);
        expenseChart.update();
    }

    // 更新 UI 與 LocalStorage
    function updateUI() {
        recordList.innerHTML = '';
        let total = 0;

        records.forEach((record, index) => {
            total += Number(record.amount);

            const item = document.createElement('div');
            item.className = 'record-item';
            item.innerHTML = `
                <div>
                    <span class="category-badge">${record.category}</span>
                    <span>${record.note ? record.note : record.category}</span>
                </div>
                <div>
                    <strong>$${record.amount}</strong>
                    <button class="delete-btn" onclick="deleteRecord(${index})">✕</button>
                </div>
            `;
            recordList.appendChild(item);
        });

        totalAmountEl.textContent = total;
        localStorage.setItem('expenses', JSON.stringify(records));
        
        // 更新圓餅圖
        updateChart();
    }

    // 表單提交事件
    form.addEventListener('submit', (e) => {
        e.preventDefault();

        const amount = document.getElementById('amount').value;
        const category = document.getElementById('category').value;
        const note = document.getElementById('note').value;

        const newRecord = {
            amount: amount,
            category: category,
            note: note
        };

        records.push(newRecord);
        updateUI();

        form.reset();
    });

    // 刪除紀錄
    function deleteRecord(index) {
        records.splice(index, 1);
        updateUI();
    }

    // 初次載入
    updateUI();
</script>

</body>
</html>
