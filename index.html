<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人簡易記帳本</title>
    <!-- 引入 Chart.js 用於繪製圓餅圖 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            border-color: #4CAF50;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        .summary {
            margin-top: 20px;
            padding: 12px;
            background-color: #eef7ee;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            color: #2e7d32;
        }

        .chart-container {
            position: relative;
            margin-top: 20px;
            width: 100%;
            max-height: 280px;
            display: flex;
            justify-content: center;
        }

        .record-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .category-badge {
            background-color: #e0e0e0;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: #333;
            margin-right: 8px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff5252;
            cursor: pointer;
            font-size: 14px;
            width: auto;
            padding: 0 5px;
        }

        .delete-btn:hover {
            background: none;
            color: #d32f2f;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>簡易記帳本</h2>
    
    <form id="expenseForm">
        <div class="form-group">
            <label for="amount">金額 ($)</label>
            <input type="number" id="amount" placeholder="請輸入金額" required min="1">
        </div>

        <div class="form-group">
            <label for="category">類別</label>
            <select id="category" required>
                <optgroup label="食">
                    <option value="食-點心">🍿 食-點心</option>
                    <option value="食-外賣">🛵 食-外賣</option>
                    <option value="食-餐廳">🍱 食-餐廳</option>
                    <option value="食-食材">🥦 食-食材</option>
                </optgroup>
                <optgroup label="生活用品">
                    <option value="生活用品-消耗">🧻 生活用品-消耗</option>
                    <option value="生活用品-非消耗">🧹 生活用品-非消耗</option>
                </optgroup>
                <optgroup label="其他主要類別">
                    <option value="住">🏠 住</option>
                    <option value="交通">🚗 交通</option>
                    <option value="娛樂">🎮 娛樂</option>
                    <option value="保險">🛡️ 保險</option>
                    <option value="可報銷">🧾 可報銷</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label for="note">備註 (可選)</label>
            <input type="text" id="note" placeholder="如：珍珠奶茶、房租">
        </div>

        <button type="submit">新增記錄</button>
    </form>

    <div class="summary">
        總支出：$<span id="totalAmount">0</span>
    </div>

    <!-- 圓餅圖容器 -->
    <div class="chart-container">
        <canvas id="expenseChart"></canvas>
    </div>

    <div class="record-list" id="recordList">
        <!-- 記帳明細會動態顯示在這裡 -->
    </div>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('expenses')) || [];

    const form = document.getElementById('expenseForm');
    const recordList = document.getElementById('recordList');
    const totalAmountEl = document.getElementById('totalAmount');
    
    // 初始化 Chart.js 圓餅圖
    const ctx = document.getElementById('expenseChart').getContext('2d');
    let expenseChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: [],
            datasets: [{
                data: [],
                backgroundColor: [
                    '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', 
                    '#9966FF', '#FF9F40', '#8AC926', '#1982C4', 
                    '#6A4C93', '#F55C47', '#42B883'
                ]
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });

    // 更新圖表資料
    function updateChart() {
        const categoryTotals = {};

        records.forEach(record => {
            const cat = record.category;
            const amt = Number(record.amount);
            categoryTotals[cat] = (categoryTotals[cat] || 0) + amt;
        });

        expenseChart.data.labels = Object.keys(categoryTotals);
        expenseChart.data.datasets[0].data = Object.values(categoryTotals);
        expenseChart.update();
    }

    // 更新 UI 與 LocalStorage
    function updateUI() {
        recordList.innerHTML = '';
        let total = 0;

        records.forEach((record, index) => {
            total += Number(record.amount);

            const item = document.createElement('div');
            item.className = 'record-item';
            item.innerHTML = `
                <div>
                    <span class="category-badge">${record.category}</span>
                    <span>${record.note ? record.note : record.category}</span>
                </div>
                <div>
                    <strong>$${record.amount}</strong>
                    <button class="delete-btn" onclick="deleteRecord(${index})">✕</button>
                </div>
            `;
            recordList.appendChild(item);
        });

        totalAmountEl.textContent = total;
        localStorage.setItem('expenses', JSON.stringify(records));
        
        // 更新圓餅圖
        updateChart();
    }

    // 表單提交事件
    form.addEventListener('submit', (e) => {
        e.preventDefault();

        const amount = document.getElementById('amount').value;
        const category = document.getElementById('category').value;
        const note = document.getElementById('note').value;

        const newRecord = {
            amount: amount,
            category: category,
            note: note
        };

        records.push(newRecord);
        updateUI();

        form.reset();
    });

    // 刪除紀錄
    function deleteRecord(index) {
        records.splice(index, 1);
        updateUI();
    }

    // 初次載入
    updateUI();
</script>

</body>
</html>
